# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage.yaml

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # BPCells is published on R-universe (not CRAN); declaring the repo
          # lets pak resolve `any::BPCells` from a proper package repository.
          extra-repositories: "https://bnprks.r-universe.dev"

      # BPCells links against HDF5 and compiles from source.
      - name: Install HDF5 (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # SCUBA from DESCRIPTION Remotes; BPCells from R-universe.
          extra-packages: any::covr, any::xml2, any::BPCells
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        with:
          # Fail CI if Codecov upload errors (e.g. missing token on a
          # private repo) so coverage reporting problems are visible.
          fail_ci_if_error: ${{ github.event_name != 'pull_request' }}
          file: ./cobertura.xml
          plugin: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
